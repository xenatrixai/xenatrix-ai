<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>n8n Connection Test</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .test-section { margin: 20px 0; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .result { margin-top: 10px; padding: 10px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .loading { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>
    <h1>n8n Connection Test</h1>
    
    <div class="test-section">
        <h2>Test Webhook Connection</h2>
        <p>Testing the n8n webhook endpoint: <code>https://n8n-production-7a00b.up.railway.app/webhook/rynex-demo</code></p>
        <button onclick="testWebhook()">Test n8n Webhook</button>
        <div id="webhook-result"></div>
    </div>

    <div class="test-section">
        <h2>Test Terminal Demo Integration</h2>
        <p>Testing the same functionality as the portfolio terminal demo</p>
        <button onclick="testTerminalDemo()">Test Terminal Demo</button>
        <div id="terminal-result"></div>
    </div>

    <script>
        function showResult(elementId, message, type) {
            const element = document.getElementById(elementId);
            element.className = `result ${type}`;
            element.textContent = message;
        }

        async function testWebhook() {
            const resultDiv = document.getElementById('webhook-result');
            showResult('webhook-result', 'Testing webhook connection...', 'loading');

            try {
                const response = await fetch('https://n8n-production-7a00b.up.railway.app/webhook/rynex-demo', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        test: true,
                        timestamp: new Date().toISOString(),
                        source: 'connection_test'
                    })
                });

                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json().catch(() => {
                    console.log('No JSON response, but request succeeded');
                    return { success: true, message: 'Webhook responded (no JSON body)' };
                });

                showResult('webhook-result', `✅ Success! Webhook is working. Response: ${JSON.stringify(data)}`, 'success');
                console.log('Success response:', data);

            } catch (error) {
                console.error('Webhook test failed:', error);
                showResult('webhook-result', `❌ Error: ${error.message}`, 'error');
            }
        }

        async function testTerminalDemo() {
            const resultDiv = document.getElementById('terminal-result');
            showResult('terminal-result', 'Testing terminal demo payload...', 'loading');

            try {
                const payload = {
                    name: 'Test User',
                    business: 'Test Business',
                    industry: 'Technology',
                    phone: '1234567890',
                    email: 'test@example.com',
                    timestamp: new Date().toISOString(),
                    source: 'portfolio_terminal_demo'
                };

                const response = await fetch('https://n8n-production-7a00b.up.railway.app/webhook/rynex-demo', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                console.log('Terminal demo test - Response status:', response.status);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json().catch(() => {
                    console.log('Terminal demo: No JSON response, but request succeeded');
                    return { success: true, message: 'Terminal demo payload sent successfully' };
                });

                showResult('terminal-result', `✅ Terminal demo working! Payload sent. Response: ${JSON.stringify(data)}`, 'success');
                console.log('Terminal demo success:', data);

            } catch (error) {
                console.error('Terminal demo test failed:', error);
                showResult('terminal-result', `❌ Error: ${error.message}`, 'error');
            }
        }
    </script>
</body>
</html>
